function pp(m){try{if(m.outcomePrices){const p=typeof m.outcomePrices==="string"?JSON.parse(m.outcomePrices):m.outcomePrices;if(p&&p.length>=1)return parseFloat(p[0])}if(m.bestAsk)return parseFloat(m.bestAsk);if(m.lastTradePrice)return parseFloat(m.lastTradePrice)}catch(e){}return null}
function fu(n){return "$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}

function rw(p,v){return Math.max(0.01,Math.min(0.99,p+(Math.random()-0.5)*2*(v||0.006)))}

function cat(m){
  const q=(m.question||"").toLowerCase();
  const tg=(m.tags||[]).map(t=>(typeof t==="string"?t:t.label||"").toLowerCase()).join(" ");
  const s=q+" "+tg;
  if(/bitcoin|ethereum|btc|eth|crypto|solana|token|defi|usdt|usdc|cardano|polkadot/.test(s))return "Crypto";
  if(/trump|election|president|congress|senat|politic|vote|governor|parliament/.test(s))return "Politics";
  if(/fed |inflation|gdp|recession|rate cut|unemployment|cpi|tariff|trade war/.test(s))return "Economics";
  if(/s.p.500|stock|gold|nasdaq|dow|market|oil|treasury|bond/.test(s))return "Markets";
  if(/\bai\b|tech|apple|google|spacex|nvidia|openai|meta |microsoft|robot/.test(s))return "Tech";
  if(/nba|nfl|soccer|sport|fifa|tennis|f1|ufc|mma|boxing|mlb|nhl/.test(s))return "Sports";
  return "Other";
}

function Spark({data}){
